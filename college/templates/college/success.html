{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: #f7fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px;">

    <!-- Main Card Container -->
    <div style="background: white; padding: 40px 32px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); width: 100%; max-width: 440px; text-align: center; box-sizing: border-box;">

        <!-- Success Icon Checkmark -->
        <div style="width: 72px; height: 72px; background-color: #f0fdf4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
            <svg style="width: 40px; height: 40px; color: #16a34a;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1 style="font-size: 24px; font-weight: 700; color: #1a202c; margin: 0 0 8px;">Payment Successful!</h1>
        <p style="font-size: 14px; color: #718096; margin: 0 0 32px;">Your registration has been processed successfully.</p>

        <!-- Receipt Box Details -->
        <div style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; text-align: left; margin-bottom: 32px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px;">
                <span style="color: #718096;">Order ID</span>
                <span style="color: #1a202c; font-weight: 600; font-family: monospace;">{{ order_id }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px;">
                <span style="color: #718096;">Payment ID</span>
                <span style="color: #1a202c; font-weight: 600; font-family: monospace;">{{ payment_id }}</span>
            </div>
            <div style="border-top: 1px dashed #e2e8f0; margin: 12px 0; padding-top: 12px; display: flex; justify-content: space-between; font-size: 15px;">
                <span style="color: #1a202c; font-weight: 600;">Amount Paid</span>
                <span style="color: #16a34a; font-weight: 700;">₹{{ amount }}</span>
            </div>
        </div>

        <!-- Call to Action Button -->
        <a href="/register/" style="display: block; width: 100%; background-color: #007bff; color: white; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: 600; text-decoration: none; transition: background-color 0.2s; box-sizing: border-box;">
            Go Back to Registration
        </a>

        <!-- Tiny Footer Policy Context Links -->
        <div style="display: flex; justify-content: space-between; gap: 8px; margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
            <a href="/privacy-policy/" style="flex: 1; text-align: center; font-size: 11px; font-weight: 500; color: #4a5568; background-color: #f7fafc; padding: 6px 4px; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none;">Privacy Policy</a>
            <a href="/terms/" style="flex: 1; text-align: center; font-size: 11px; font-weight: 500; color: #4a5568; background-color: #f7fafc; padding: 6px 4px; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none;">Terms & Conditions</a>
            <a href="/refund-policy/" style="flex: 1; text-align: center; font-size: 11px; font-weight: 500; color: #4a5568; background-color: #f7fafc; padding: 6px 4px; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none;">Refund Policy</a>
        </div>

    </div>

</body>
</html>
